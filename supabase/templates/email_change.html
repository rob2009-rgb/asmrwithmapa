<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Your New Email</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #020617;
            color: #f8fafc;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #0f172a;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(244, 114, 182, 0.1);
        }

        .hero {
            background: linear-gradient(135deg, #db2777 0%, #7c3aed 100%);
            padding: 40px;
            text-align: center;
        }

        .content {
            padding: 40px;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin: 0 0 16px 0;
            letter-spacing: -0.025em;
            color: #ffffff;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            color: #94a3b8;
            margin: 0 0 32px 0;
        }

        .button {
            display: inline-block;
            background: #ec4899;
            color: #ffffff;
            padding: 16px 32px;
            border-radius: 12px;
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 10px 15px -3px rgba(236, 72, 153, 0.3);
        }

        .footer {
            padding: 32px;
            background-color: #020617;
            text-align: center;
            font-size: 12px;
            color: #475569;
        }

        .footer a {
            color: #ec4899;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="hero">
            <h1 style="margin:0; font-style: italic;">ASMR with MAPA</h1>
            <p
                style="color: rgba(255,255,255,0.8); margin: 8px 0 0 0; text-transform: uppercase; font-weight: 800; font-size: 10px; letter-spacing: 0.2em;">
                The Sanctuary</p>
        </div>
        <div class="content">
            <h1>Confirm Your New Email Address</h1>
            <p>You requested to change your email address. Please click the button below to confirm the change.</p>
            <a href="{{ .ConfirmationURL }}" class="button">Confirm Change</a>
        </div>
        <div class="footer">
            <p>&copy; 2026 ASMR with MAPA. All rights reserved.</p>
            <p>Questions? Reach out to <a href="mailto:support@asmrwithmapa.com">support@asmrwithmapa.com</a></p>
        </div>
    </div>
</body>

</html>
